services:
  postgres:
    image: postgres:18.4-alpine
    container_name: safety-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-safety_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-safety_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-construction_safety}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-safety_admin} -d ${POSTGRES_DB:-construction_safety}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: safety-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-safety_admin}:${POSTGRES_PASSWORD:-safety_secret_change_me}@postgres:5432/${POSTGRES_DB:-construction_safety}
    volumes:
      - shared_data:/data
      - ./models:/app/models:ro
      - ./input_videos:/data/input_videos:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: safety-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  shared_data:
